version: "3.9"

services:
# 数据库服务
  mysql-db:
    image: mysql:8.0.32
    container_name: mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=monovista
    ports:
      - "13306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  # Redis 服务
  redis:
    image: redis:6.2
    container_name: redis
    restart: always
    ports:
      - "16379:6379"
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: monovista-backend
    restart: always
    env_file:
      - .env.production
    ports:
      - "5000:5000"
    volumes:
      - ./static:/app/static
      - ./models_cache:/app/models_cache
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monovista-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
